<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="sign_up.css">
    <title>Sign Up</title>
</head>
<body>

   <div class="signup">
    <form action="create.php" method="POST">
        <h2>Sign Up</h2>
        <label for="fname">First Name:</label>
        <br>
        <input type="text" name="userFname">
        <br>
        <label for="lname">Last Name</label>
        <br>
        <input type="text" name="userLname">
        <br>
        <label for="email">Email</label>
        <br>
        <input type="email" name="userEmail">
        <br>
        <label for="">Username:</label>
        <br>
        <input type="text" name="userName">
        <br>
        <label for="password">Password:</label>
        <br>
        <input type="password" name="userPassword" placeholder="Enter new Password" id="password">
        <br>
        <label for="Cpassword">Confirm Password</label>
        <br>
        <input type="password" name="userPasswordConfirm" placeholder="Confirm new Password" id="Cpassword">
        <br>
        <br>
        <label for="gender">Gender:</label>
        <br>
        <input type="radio" name="gender" value="male">Male
        <input type="radio" name="gender" value="female">Female
        <br>
        <br>
        <label for="accountCreate">Create Account</label>
        <br>
        <input type="submit">
    </form>
   </div> 
   <script>
    document.querySelector("form").addEventListener("submit", (event)=>{
        const newPass = document.getElementById('password')
        const Cpass = document.getElementById('Cpassword')
        
        if(newPass.value.trim() !== Cpass.value.trim()){
            event.preventDefault()
            alert("Password do not match")
        }
        else if (!newPass.value.trim() || !Cpass.value.trim()){
            event.preventDefault()
            alert("Passwords fields are empty!!")
        }
    })
   </script>
</body>
</html>
