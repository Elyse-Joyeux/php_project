<div class="panel-right">
    <div class="form-card">
        <h2>Sign In</h2>
        <p class="sub">Enter your credentials to continue</p>

        <div class="error-box" id="errorBox"></div>

        <form action="login.php" method="POST" id="loginForm" novalidate>
            <input type="hidden" name="csrf_token" value="<?= csrf_token() ?>">

            <div class="field">
                <label for="userEmail">Email Address</label>
                <input type="email" name="userEmail" id="userEmail"
                       placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="field">
                <label for="userPassword">Password</label>
                <input type="password" name="userPassword" id="userPassword"
                       placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login"><span>Sign In →</span></button>
        </form>

        <div class="divider">or</div>
        <div class="link-signup">Don't have an account? <a href="sign_up.html">Create one</a></div>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const err = params.get('error');
    if (err) {
        const box = document.getElementById('errorBox');
        box.textContent = decodeURIComponent(err);
        box.classList.add('show');
    }

    document.getElementById('loginForm').addEventListener('submit', e => {
        const email = document.getElementById('userEmail').value.trim();
        const pwd   = document.getElementById('userPassword').value;
        const box   = document.getElementById('errorBox');

        if (!email || !pwd) {
            e.preventDefault();
            box.textContent = 'Please fill in all fields.';
            box.classList.add('show');
        }
    });
</script>
</body>
</html>
